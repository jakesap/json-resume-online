services:
  - type: web
    name: json-resume-online
    runtime: node
    buildCommand: bun install && bunx puppeteer browsers install chrome && bun run build:prod
    startCommand: bun start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/.puppeteer-cache
